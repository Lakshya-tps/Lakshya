services:
  - type: web
    # Service name; Render will use this name for the default URL (lowercased).
    name: lakshya-version1
    env: docker
    # Deploy from Docker Hub image. Docker image/repo names must be lowercase.
    image: ganeshkunche/version1:latest
    plan: starter
    region: oregon
    disk:
      name: lakshya-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "5001"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        # Leave value blank here; set this in Render dashboard as a secret
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: NOTIFICATION_EMAIL
        value: ""
